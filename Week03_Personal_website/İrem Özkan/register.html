<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Get Started</h1>

<form class="form-card">
  <div class="form-group">
    <label style="display: block; margin-bottom: 5px; font-weight: 600;">Full Name</label>
    <input type="text" placeholder="John Doe" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
  </div>

  <div class="form-group">
    <label style="display: block; margin-bottom: 5px; font-weight: 600;">Email Address</label>
    <input type="email" placeholder="john@example.com" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
  </div>

  <div class="form-group">
    <label style="display: block; margin-bottom: 5px; font-weight: 600;">Secure Password</label>
    <input type="password" minlength="6" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
  </div>

  <button class="btn-primary">Create My Account</button>
  <a href="index.html" style="text-align: center; font-size: 14px; color: #64748b; text-decoration: none;">Cancel</a>
</form>

</body>
</html>
